<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NicoSavesTheWorld</title>
  <meta name="description" content="Juegos mentales de NicoSavesTheWorld.">
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f4ef;
      --paper: #fbfcfa;
      --ink: #1c1a1c;
      --muted: #706a63;
      --line: #e4ded6;
      --accent: #ff8b00;
      --accent-soft: rgba(255, 139, 0, 0.22);
      --accent-line: rgba(255, 139, 0, 0.42);
      --soft: #f0ebe4;
      --shadow: 0 18px 42px rgba(28, 26, 28, 0.1);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(28,26,28,0.035) 1px, transparent 1px),
        linear-gradient(180deg, rgba(28,26,28,0.03) 1px, transparent 1px),
        var(--bg);
      background-size: 56px 56px;
    }

    button,
    a {
      font: inherit;
    }

    a {
      color: inherit;
    }

    .page {
      width: min(1040px, calc(100% - 24px));
      margin: 0 auto;
      padding: 28px 0 46px;
    }

    .masthead {
      display: block;
      padding: 8px 0 26px;
      text-align: center;
    }

    .brand-logo {
      display: block;
      width: min(260px, 72vw);
      height: auto;
      margin: 0 auto;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin: 0 auto;
    }

    .game-card {
      position: relative;
      display: grid;
      min-height: 220px;
      grid-template-rows: auto 1fr auto;
      gap: 18px;
      padding: 18px;
      overflow: hidden;
      border: 1px solid var(--accent-line);
      border-radius: var(--radius);
      background:
        linear-gradient(145deg, rgba(255, 139, 0, 0.34), var(--accent-soft) 44%, rgba(251, 252, 250, 0.74)),
        rgba(251, 252, 250, 0.56);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.58),
        0 16px 38px rgba(28, 26, 28, 0.1),
        0 10px 28px rgba(255, 139, 0, 0.12);
      backdrop-filter: blur(16px) saturate(1.18);
      text-align: center;
    }

    .game-card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.38), transparent 34%),
        linear-gradient(90deg, rgba(28, 26, 28, 0.08) 1px, transparent 1px);
      background-size: auto, 18px 18px;
      opacity: 0.42;
    }

    .game-card.is-hidden {
      display: none;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      color: rgba(28, 26, 28, 0.76);
      font-size: 0.78rem;
      font-weight: 720;
    }

    .meta span {
      position: relative;
    }

    .dot {
      width: 4px;
      height: 4px;
      align-self: center;
      border-radius: 50%;
      background: var(--accent);
    }

    .game-card h3 {
      position: relative;
      margin: 0 auto;
      max-width: 280px;
      font-size: 1.36rem;
      line-height: 1.12;
      letter-spacing: 0;
    }

    .game-card p {
      position: relative;
      margin: 10px 0 0;
      color: rgba(28, 26, 28, 0.72);
      font-size: 0.95rem;
      line-height: 1.52;
    }

    .play-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 42px;
      width: 100%;
      padding: 0 12px 0 14px;
      border: 1px solid rgba(28, 26, 28, 0.14);
      border-radius: var(--radius);
      background: var(--accent);
      color: var(--ink);
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 760;
      transition: transform 180ms ease, background 180ms ease;
    }

    .play-link::after {
      content: "";
      width: 8px;
      height: 8px;
      border-right: 2px solid currentColor;
      border-top: 2px solid currentColor;
      transform: rotate(45deg);
    }

    .play-link:hover,
    .play-link:focus-visible {
      outline: none;
      background: var(--ink);
      color: #fff;
      transform: translateY(-1px);
    }

    .empty {
      display: none;
      padding: 22px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      background: rgba(251, 252, 250, 0.64);
      line-height: 1.55;
    }

    .empty.is-visible {
      display: block;
    }

    @media (min-width: 680px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (min-width: 980px) {
      .grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 20px, 1040px);
        padding-top: 20px;
      }

      .game-card {
        min-height: 218px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="masthead" aria-label="NicoSavesTheWorld">
      <img class="brand-logo" src="cerebrologo.png" alt="NicoSavesTheWorld">
    </section>

    <section class="grid" id="game-grid" aria-label="Juegos publicados"></section>
    <p class="empty" id="empty-state">Todavía no hay juegos.</p>
  </main>

  <script>
    const games = [
      {
        title: "Magistrado del Mosaico",
        date: "2026-06-19",
        skill: "Grillas lógicas",
        description: "Restaura mosaicos de juzgado alternando marcas de gremio hasta que cuadren el equilibrio latino y las leyes extra.",
        url: "https://nsanchezBG.github.io/CodexCloudBase/mosaic-magistrate-2026-06-19/"
      },
      {
        title: "Cerrajero Orbital",
        date: "2026-06-19",
        skill: "Lógica de patrones",
        description: "Gira tres anillos orbitales hasta que las pistas del telescopio alineen símbolos, colores y sectores.",
        url: "https://nsanchezBG.github.io/CodexCloudBase/orbit-locksmith-2026-06-19/"
      },
      {
        title: "Mensajero Prisma",
        date: "2026-06-19",
        skill: "Planificación de rutas",
        description: "Guía a un mensajero con color por puertas prisma y predice cambios para igualar cada sello.",
        url: "https://nsanchezBG.github.io/CodexCloudBase/prism-courier-2026-06-19/"
      },
      {
        title: "Cartógrafo de Sombras",
        date: "2026-06-19",
        skill: "Deducción espacial",
        description: "Reconstruye sombras ocultas en islas 5x5 usando conteos de filas, columnas y notas del terreno.",
        url: "https://nsanchezBG.github.io/CodexCloudBase/shadow-cartographer-2026-06-19/"
      },
      {
        title: "Registro de Faroles",
        date: "2026-06-19",
        skill: "Deducción aritmética",
        description: "Equilibra registros de faroles llenando una grilla 4x4 con pistas de filas, columnas, valores fijos y distrito.",
        url: "https://nsanchezBG.github.io/CodexCloudBase/lantern-ledger-2026-06-19/"
      },
      {
        title: "Huerto de Ecos",
        date: "2026-06-19",
        skill: "Memoria secuencial",
        description: "Memoriza melodías de fruta, transfórmalas con reglas cambiantes del huerto y reproduce el eco.",
        url: "https://nsanchezBG.github.io/CodexCloudBase/echo-orchard-2026-06-19/"
      }
    ];

    const grid = document.querySelector("#game-grid");
    const empty = document.querySelector("#empty-state");

    function renderGames() {
      grid.innerHTML = "";
      empty.classList.toggle("is-visible", games.length === 0);

      games.forEach((game) => {
        const article = document.createElement("article");
        article.className = "game-card";

        const meta = document.createElement("div");
        meta.className = "meta";
        const date = document.createElement("span");
        date.textContent = game.date;
        const dot = document.createElement("span");
        dot.className = "dot";
        const skill = document.createElement("span");
        skill.textContent = game.skill;

        const body = document.createElement("div");
        const title = document.createElement("h3");
        title.textContent = game.title;
        const description = document.createElement("p");
        description.textContent = game.description;

        const link = document.createElement("a");
        link.className = "play-link";
        link.href = game.url;
        link.textContent = "Jugar";

        meta.append(date, dot, skill);
        body.append(title, description);
        article.append(meta, body, link);
        grid.appendChild(article);
      });
    }

    renderGames();
  </script>
</body>
</html>
