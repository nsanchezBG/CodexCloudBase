<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrenamiento Mental NicoSavesTheWorld</title>
  <meta name="description" content="Un arcade diario y tranquilo de pequeños juegos mentales de NicoSavesTheWorld.">
  <style>
    :root {
      color-scheme: light;
      --bg: #eef2f0;
      --paper: #fbfcfa;
      --ink: #27302f;
      --muted: #71807b;
      --line: #d8e0dc;
      --accent: #cf6f78;
      --accent-2: #8aa39b;
      --soft: #e5ebe8;
      --shadow: 0 18px 42px rgba(39, 48, 47, 0.08);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(255,255,255,0.28) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255,255,255,0.24) 1px, transparent 1px),
        var(--bg);
      background-size: 56px 56px;
    }

    button,
    a {
      font: inherit;
    }

    a {
      color: inherit;
    }

    .page {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0 52px;
    }

    .masthead {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 28px;
      align-items: end;
      min-height: 230px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--line);
    }

    .mark {
      display: grid;
      grid-template-columns: repeat(3, 24px);
      grid-auto-rows: 24px;
      gap: 12px;
      width: max-content;
      margin-bottom: 28px;
    }

    .mark span {
      display: block;
      width: 24px;
      height: 24px;
      background: var(--ink);
      transform: rotate(45deg);
    }

    .mark span:nth-child(3),
    .mark span:nth-child(5) {
      background: transparent;
      border: 1px solid var(--line);
    }

    .mark span:nth-child(7) {
      background: var(--paper);
      border: 1px solid var(--line);
    }

    h1 {
      max-width: 760px;
      margin: 0;
      font-size: clamp(2.1rem, 6vw, 4.9rem);
      line-height: 0.96;
      letter-spacing: 0;
    }

    .subline {
      max-width: 560px;
      margin: 16px 0 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    .count {
      min-width: 148px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(251, 252, 250, 0.72);
      box-shadow: var(--shadow);
    }

    .count span {
      display: block;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .count strong {
      display: block;
      margin-top: 6px;
      font-size: 2.2rem;
      line-height: 1;
    }

    .bar {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 18px;
      align-items: center;
      margin: 24px 0 16px;
    }

    .bar h2 {
      margin: 0;
      font-size: 0.92rem;
      font-weight: 780;
      color: var(--muted);
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .filter {
      min-height: 34px;
      padding: 0 11px;
      border: 1px solid transparent;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.9rem;
    }

    .filter:hover,
    .filter:focus-visible {
      color: var(--ink);
      outline: none;
      border-color: var(--line);
      background: rgba(251, 252, 250, 0.58);
    }

    .filter[aria-pressed="true"] {
      color: var(--ink);
      background: var(--paper);
      border-color: var(--line);
      box-shadow: 0 8px 20px rgba(39, 48, 47, 0.05);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .game-card {
      position: relative;
      display: grid;
      min-height: 248px;
      grid-template-rows: auto 1fr auto;
      gap: 18px;
      padding: 18px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(251, 252, 250, 0.84);
      box-shadow: 0 14px 34px rgba(39, 48, 47, 0.07);
    }

    .game-card::before {
      content: "";
      position: absolute;
      right: 18px;
      top: 18px;
      width: 36px;
      height: 36px;
      border: 1px solid var(--line);
      transform: rotate(45deg);
      background: var(--soft);
    }

    .game-card:nth-child(3n + 2)::before {
      border-radius: 50%;
      transform: none;
      background: #f4d9dc;
      border-color: #e7bcc2;
    }

    .game-card:nth-child(3n)::before {
      clip-path: polygon(50% 0, 100% 100%, 0 100%);
      transform: none;
      border: 0;
      background: var(--accent-2);
    }

    .game-card.is-hidden {
      display: none;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding-right: 54px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 720;
    }

    .dot {
      width: 4px;
      height: 4px;
      align-self: center;
      border-radius: 50%;
      background: var(--accent);
    }

    .game-card h3 {
      position: relative;
      margin: 0;
      max-width: 250px;
      font-size: 1.36rem;
      line-height: 1.12;
      letter-spacing: 0;
    }

    .game-card p {
      position: relative;
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.52;
    }

    .play-link {
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 42px;
      width: 100%;
      padding: 0 12px 0 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--ink);
      color: #fff;
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 760;
      transition: transform 180ms ease, background 180ms ease;
    }

    .play-link::after {
      content: "";
      width: 8px;
      height: 8px;
      border-right: 2px solid currentColor;
      border-top: 2px solid currentColor;
      transform: rotate(45deg);
    }

    .play-link:hover,
    .play-link:focus-visible {
      outline: none;
      background: #384240;
      transform: translateY(-1px);
    }

    .empty {
      display: none;
      padding: 22px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      background: rgba(251, 252, 250, 0.64);
      line-height: 1.55;
    }

    .empty.is-visible {
      display: block;
    }

    footer {
      margin-top: 28px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.6;
    }

    @media (max-width: 900px) {
      .masthead {
        grid-template-columns: 1fr;
        min-height: 0;
      }

      .count {
        width: 100%;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 24px, 1120px);
        padding-top: 22px;
      }

      .masthead {
        padding-bottom: 20px;
      }

      .mark {
        grid-template-columns: repeat(3, 20px);
        grid-auto-rows: 20px;
        gap: 10px;
        margin-bottom: 24px;
      }

      .mark span {
        width: 20px;
        height: 20px;
      }

      .bar {
        grid-template-columns: 1fr;
      }

      .filters {
        justify-content: flex-start;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .game-card {
        min-height: 218px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="masthead" aria-labelledby="page-title">
      <div>
        <div class="mark" aria-hidden="true">
          <span></span><span></span><span></span>
          <span></span><span></span><span></span>
          <span></span><span></span><span></span>
        </div>
        <h1 id="page-title">Entrenamiento Mental NicoSavesTheWorld</h1>
        <p class="subline">Pequeños ejercicios diarios para enfocar la mente, reconocer patrones y empezar con calma.</p>
      </div>
      <aside class="count" aria-label="Estado del arcade">
        <span>Publicados</span>
        <strong id="game-count">0</strong>
      </aside>
    </section>

    <section class="bar" aria-label="Filtros de juegos">
      <h2>Catálogo</h2>
      <div class="filters" id="filters"></div>
    </section>

    <section class="grid" id="game-grid" aria-label="Juegos publicados"></section>
    <p class="empty" id="empty-state">Todavía no hay juegos para este filtro.</p>

    <footer>
      Arcade estático para GitHub Pages. Los juegos nuevos aparecen primero.
    </footer>
  </main>

  <script>
    const games = [
      {
        title: "Magistrado del Mosaico",
        date: "2026-06-19",
        skill: "Grillas lógicas",
        description: "Restaura mosaicos de juzgado alternando marcas de gremio hasta que cuadren el equilibrio latino y las leyes extra.",
        url: "https://nsanchezBG.github.io/CodexCloudBase/mosaic-magistrate-2026-06-19/"
      },
      {
        title: "Cerrajero Orbital",
        date: "2026-06-19",
        skill: "Lógica de patrones",
        description: "Gira tres anillos orbitales hasta que las pistas del telescopio alineen símbolos, colores y sectores.",
        url: "https://nsanchezBG.github.io/CodexCloudBase/orbit-locksmith-2026-06-19/"
      },
      {
        title: "Mensajero Prisma",
        date: "2026-06-19",
        skill: "Planificación de rutas",
        description: "Guía a un mensajero con color por puertas prisma y predice cambios para igualar cada sello.",
        url: "https://nsanchezBG.github.io/CodexCloudBase/prism-courier-2026-06-19/"
      },
      {
        title: "Cartógrafo de Sombras",
        date: "2026-06-19",
        skill: "Deducción espacial",
        description: "Reconstruye sombras ocultas en islas 5x5 usando conteos de filas, columnas y notas del terreno.",
        url: "https://nsanchezBG.github.io/CodexCloudBase/shadow-cartographer-2026-06-19/"
      },
      {
        title: "Registro de Faroles",
        date: "2026-06-19",
        skill: "Deducción aritmética",
        description: "Equilibra registros de faroles llenando una grilla 4x4 con pistas de filas, columnas, valores fijos y distrito.",
        url: "https://nsanchezBG.github.io/CodexCloudBase/lantern-ledger-2026-06-19/"
      },
      {
        title: "Huerto de Ecos",
        date: "2026-06-19",
        skill: "Memoria secuencial",
        description: "Memoriza melodías de fruta, transfórmalas con reglas cambiantes del huerto y reproduce el eco.",
        url: "https://nsanchezBG.github.io/CodexCloudBase/echo-orchard-2026-06-19/"
      }
    ];

    const grid = document.querySelector("#game-grid");
    const filters = document.querySelector("#filters");
    const count = document.querySelector("#game-count");
    const empty = document.querySelector("#empty-state");

    const skills = ["Todos", ...Array.from(new Set(games.map((game) => game.skill))).sort()];
    let activeSkill = "Todos";

    function renderFilters() {
      filters.innerHTML = "";
      skills.forEach((skill) => {
        const button = document.createElement("button");
        button.className = "filter";
        button.type = "button";
        button.textContent = skill;
        button.setAttribute("aria-pressed", String(skill === activeSkill));
        button.addEventListener("click", () => {
          activeSkill = skill;
          renderFilters();
          renderGames();
        });
        filters.appendChild(button);
      });
    }

    function renderGames() {
      grid.innerHTML = "";
      const visibleGames = games.filter((game) => activeSkill === "Todos" || game.skill === activeSkill);

      count.textContent = String(games.length).padStart(2, "0");
      empty.classList.toggle("is-visible", visibleGames.length === 0);

      visibleGames.forEach((game) => {
        const article = document.createElement("article");
        article.className = "game-card";

        const meta = document.createElement("div");
        meta.className = "meta";
        const date = document.createElement("span");
        date.textContent = game.date;
        const dot = document.createElement("span");
        dot.className = "dot";
        const skill = document.createElement("span");
        skill.textContent = game.skill;

        const body = document.createElement("div");
        const title = document.createElement("h3");
        title.textContent = game.title;
        const description = document.createElement("p");
        description.textContent = game.description;

        const link = document.createElement("a");
        link.className = "play-link";
        link.href = game.url;
        link.textContent = "Jugar";

        meta.append(date, dot, skill);
        body.append(title, description);
        article.append(meta, body, link);
        grid.appendChild(article);
      });
    }

    renderFilters();
    renderGames();
  </script>
</body>
</html>
