name: Daily Codex puzzle request

on:
  schedule:
    - cron: "0 8 * * *" # 3:00 a.m. Peru time
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  request-codex:
    runs-on: ubuntu-latest
    steps:
      - name: Create daily Codex issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const title = `Daily brain training game - ${today}`;

            const body = `@codex

            Read instructions.md and memory.md in this repository, then execute the full Daily Mental Puzzle Game Generator workflow.

            Important architecture: do not create a new GitHub repository. This repository is the single NicoSavesTheWorld Brain Training arcade. Create one new original static web puzzle game as a new slug folder inside this repository, with its playable page at <game-slug>/index.html.

            Update the root index.html arcade homepage so it links to the new game, and update memory.md so future runs avoid repeating the concept.

            Commit all changes directly to the main branch. Do not create a pull request and do not call make_pr. If direct commits to main are blocked by permissions, branch protection, or the Codex environment, report that blocker clearly.

            Assume GitHub Pages is enabled for this base repository from branch main and folder /. Use this URL format for the new game:
            https://nsanchezBG.github.io/CodexCloudBase/<game-slug>/

            Follow instructions.md as the source of truth. Do not ask for confirmation unless a permission or platform limitation blocks the run.

            Final report should include:
            - game title
            - folder path
            - live GitHub Pages URL
            - short description of the mechanic
            - whether testing succeeded
            - any known limitations`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            });
