name: Daily Codex puzzle request

on:
  schedule:
    - cron: "0 8 * * *" # 3:00 a.m. Peru time
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  request-codex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout arcade repo
        uses: actions/checkout@v4

      - name: Create daily Codex issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const fs = require('fs');

            const peruDateParts = new Intl.DateTimeFormat('en-CA', {
              timeZone: 'America/Lima',
              year: 'numeric',
              month: '2-digit',
              day: '2-digit'
            }).formatToParts(new Date());

            const getPart = (type) => peruDateParts.find((part) => part.type === type).value;
            const today = `${getPart('year')}-${getPart('month')}-${getPart('day')}`;
            const memory = fs.existsSync('memory.md') ? fs.readFileSync('memory.md', 'utf8') : '';
            const alreadyGeneratedToday = new RegExp(`^##\\s+${today}\\s+-`, 'm').test(memory);

            if (alreadyGeneratedToday) {
              core.notice(`A game is already logged in memory.md for ${today}; skipping Codex issue creation.`);
              return;
            }

            const title = `Daily brain training game - ${today}`;

            const body = `@codex

            Read instructions.md and memory.md in this repository, then execute the full Daily Mental Puzzle Game Generator workflow.

            Important architecture: do not create a new GitHub repository. This repository is the single NicoSavesTheWorld Brain Training arcade. Create one new original static web puzzle game as a new slug folder inside this repository, with its playable page at <game-slug>/index.html.

            Update the root index.html arcade homepage so it links to the new game, and update memory.md so future runs avoid repeating the concept.

            Commit the changes, then push them directly to GitHub main with:
            git push origin HEAD:main

            A local commit is not complete. Before reporting success, verify that the new game folder plus index.html and memory.md changes are visible on GitHub main.

            Do not create a pull request and do not call make_pr. If direct pushes to main are blocked by permissions, branch protection, or the Codex environment, report that blocker clearly.

            Assume GitHub Pages is enabled for this base repository from branch main and folder /. Use this URL format for the new game:
            https://nsanchezBG.github.io/CodexCloudBase/<game-slug>/

            Follow instructions.md as the source of truth. Do not ask for confirmation unless a permission or platform limitation blocks the run.

            Final report should include:
            - game title
            - folder path
            - live GitHub Pages URL
            - short description of the mechanic
            - whether testing succeeded
            - confirmation that changes were pushed to GitHub main
            - any known limitations`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            });
